<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Zero to Modern AI — Gamified Command Deck</title>
    <meta name="description" content="A gamified, multi-user learning roadmap and Command Deck for tracking Zero to Modern AI progress, streaks, achievements, and notepad logs." />
    
    <!-- Inline script to load theme immediately and avoid light flashes -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('zeroToModernAI_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();
    </script>
    
    <!-- Google Fonts: Nunito for Duolingo aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300..1000;1,300..1000&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
